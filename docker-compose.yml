# OPTIONAL: Only needed for drizzle-kit studio or direct SQL access during development.
# The app uses an embedded database (PGlite) — Docker is NOT required to run.

# === FILE PURPOSE ===
# Docker Compose for local development PostgreSQL instance.
# Run: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: living-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: living_dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
