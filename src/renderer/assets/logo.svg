<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" fill="none">
  <defs>
    <!-- Deep premium materials: Matte dark base -->
    <linearGradient id="logo-base-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141a23" />
      <stop offset="100%" stop-color="#080b0f" />
    </linearGradient>

    <!-- Top edge rim-light -->
    <linearGradient id="logo-rim-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Refined pulse gradient -->
    <linearGradient id="logo-pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a8e8c" />
      <stop offset="100%" stop-color="#3ee8e4" />
    </linearGradient>

    <!-- Chevron gradient -->
    <linearGradient id="logo-chev-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ee8e4" />
      <stop offset="100%" stop-color="#a0fcf9" />
    </linearGradient>

    <!-- Ambient glow filter -->
    <filter id="logo-ambient-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Text Fill -->
    <linearGradient id="logo-text-grad" x1="0" y1="0" x2="0" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
  </defs>

  <!-- === ICON SECTION === -->
  <g transform="translate(10, 10)">
    <!-- Container Shadow -->
    <rect x="2" y="3" width="96" height="96" rx="22" fill="#000000" opacity="0.3" />

    <!-- Main container plate -->
    <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#logo-base-bg)" />

    <!-- Rim light/bevel -->
    <rect x="3" y="3" width="94" height="94" rx="21" stroke="url(#logo-rim-light)" stroke-width="1.5" fill="none" />

    <!-- Outer border -->
    <rect x="2" y="2" width="96" height="96" rx="22" stroke="#000000" stroke-width="1.5" stroke-opacity="0.6" fill="none" />

    <!-- Core Icon Group -->
    <g filter="url(#logo-ambient-glow)">
      <!-- Drop shadow -->
      <g transform="translate(0, 3)" opacity="0.35">
        <path d="M 14 50 L 28 50 L 34 20 L 46 80 L 52 50 L 66 50"
              stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <path d="M 72 36 L 86 50 L 72 64"
              stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </g>

      <!-- Pulse Line (Life) -->
      <path d="M 14 50 L 28 50 L 34 20 L 46 80 L 52 50 L 66 50"
            stroke="url(#logo-pulse-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />

      <!-- Forward Chevron (Dash) -->
      <path d="M 72 36 L 86 50 L 72 64"
            stroke="url(#logo-chev-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
  </g>

  <!-- === TEXT SECTION === -->
  <text x="135" y="80" font-family="'Orbitron', 'Inter', sans-serif" font-size="48" font-weight="700" fill="url(#logo-text-grad)" letter-spacing="2">
    Life<tspan font-weight="400" fill="#3ee8e4">Dash</tspan>
  </text>
</svg>
