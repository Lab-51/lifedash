<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" fill="none">
  <defs>
    <!-- Dark surface -->
    <linearGradient id="logo-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#0a0e17" />
    </linearGradient>

    <!-- Accent pulse gradient -->
    <linearGradient id="logo-pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3ee8e4" />
      <stop offset="50%" stop-color="#3ee8e4" />
      <stop offset="100%" stop-color="#1a8e8c" />
    </linearGradient>

    <!-- Border highlight -->
    <linearGradient id="logo-border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ee8e4" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#3ee8e4" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#3ee8e4" stop-opacity="0.3" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="logo-container-clip">
      <rect x="14" y="14" width="92" height="92" rx="20" />
    </clipPath>

    <!-- Text Fill -->
    <linearGradient id="logo-text-grad" x1="0" y1="0" x2="0" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
  </defs>

  <!-- === ICON SECTION === -->
  <g transform="translate(10, 10)">
    <!-- Container background -->
    <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#logo-bg-grad)" />

    <!-- Inner clipped elements (Grid lines) -->
    <g clip-path="url(#logo-container-clip)">
      <line x1="20" y1="0" x2="20" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
      <line x1="50" y1="0" x2="50" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
      <line x1="80" y1="0" x2="80" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
      <line x1="0" y1="35" x2="100" y2="35" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
      <line x1="0" y1="65" x2="100" y2="65" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
    </g>

    <!-- Container border -->
    <rect x="4.75" y="4.75" width="90.5" height="90.5" rx="19.5" stroke="url(#logo-border-grad)" stroke-width="1.5" fill="none" />

    <!-- Pulse + chevron -->
    <g transform="translate(5, 1)" filter="url(#logo-glow)">
      <polyline
        points="14,50 24,50 30,42 38,62 46,30 54,68 60,50 70,50"
        stroke="url(#logo-pulse-grad)"
        stroke-width="4.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
      <polyline
        points="67,43 76,50 67,57"
        stroke="url(#logo-pulse-grad)"
        stroke-width="4.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
    </g>

    <!-- Node points -->
    <circle cx="23" cy="51" r="2" fill="#3ee8e4" opacity="0.7" />
    <circle cx="55" cy="31" r="2" fill="#3ee8e4" opacity="0.8" />
    <circle cx="85" cy="51" r="2" fill="#3ee8e4" opacity="0.7" />
  </g>

  <!-- === TEXT SECTION === -->
  <text x="135" y="80" font-family="'Orbitron', 'Inter', sans-serif" font-size="48" font-weight="700" fill="url(#logo-text-grad)" letter-spacing="2">
    Life<tspan font-weight="400" fill="#3ee8e4">Dash</tspan>
  </text>
</svg>
