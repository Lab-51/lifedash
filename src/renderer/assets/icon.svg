<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Rich Slate/Indigo Background -->
    <linearGradient id="v3-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" /> <!-- slate-800 -->
      <stop offset="100%" stop-color="#0f172a" /> <!-- slate-900 -->
    </linearGradient>
    
    <!-- Vivid Cyan-Blue Pulse -->
    <linearGradient id="v3-pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" /> <!-- cyan-400 -->
      <stop offset="50%" stop-color="#3b82f6" /> <!-- blue-500 -->
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Subtle Inner Glow/Highlight -->
    <linearGradient id="v3-border" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
    
    <!-- Shadow for depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Container Squircle -->
  <!-- Main Fill -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#v3-bg)" />
  <!-- Subtle Border (Glass effect) -->
  <rect x="5.5" y="5.5" width="89" height="89" rx="21.5" stroke="url(#v3-border)" stroke-width="1" fill="none" />

  <g transform="translate(0, -3)">
    <!-- Pulse Path: Calculated Growth -->
    <!-- Flat start -> Small precursor -> Big Spike -> Stabilization -> Arrow out -->
    <!-- The line now breaks to let the arrow head stand out or connects smoothly -->
    
    <!-- Main Line -->
    <path d="M22,55 L30,55 L35,48 L42,65 L48,35 L55,70 L62,55 L75,55" 
          stroke="url(#v3-pulse)" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none" 
          style="filter: drop-shadow(0px 0px 3px rgba(34, 211, 238, 0.4));" />
          
    <!-- Arrow Head (Distinct) -->
    <path d="M72,49 L78,55 L72,61" 
          stroke="url(#v3-pulse)" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"
          style="filter: drop-shadow(0px 0px 3px rgba(59, 130, 246, 0.4));" />
  </g>
</svg>
