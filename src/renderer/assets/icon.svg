<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Dark surface -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#0a0e17" />
    </linearGradient>

    <!-- Accent pulse gradient -->
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3ee8e4" />
      <stop offset="50%" stop-color="#3ee8e4" />
      <stop offset="100%" stop-color="#1a8e8c" />
    </linearGradient>

    <!-- Border highlight -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ee8e4" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#3ee8e4" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#3ee8e4" stop-opacity="0.3" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip path to hide overflowing grid lines from the rounded corners -->
    <clipPath id="container-clip">
      <rect x="4" y="4" width="92" height="92" rx="20" />
    </clipPath>
  </defs>

  <!-- Container background -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#bg-grad)" />

  <!-- Inner clipped elements (Grid lines) -->
  <g clip-path="url(#container-clip)">
    <!-- Subtle inner grid lines -->
    <line x1="20" y1="0" x2="20" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
    <line x1="50" y1="0" x2="50" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
    <line x1="80" y1="0" x2="80" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
    <line x1="0" y1="35" x2="100" y2="35" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
    <line x1="0" y1="65" x2="100" y2="65" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
  </g>

  <!-- Container border (drawn AFTER grid so grid lines don't overlap the border line) -->
  <rect x="4.75" y="4.75" width="90.5" height="90.5" rx="19.5" stroke="url(#border-grad)" stroke-width="1.5" fill="none" />

  <!-- Pulse + chevron, centered with translate(5, 1) -->
  <g transform="translate(5, 1)" filter="url(#glow)">
    <polyline
      points="14,50 24,50 30,42 38,62 46,30 54,68 60,50 70,50"
      stroke="url(#pulse-grad)"
      stroke-width="4.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- Chevron arrow -->
    <polyline
      points="67,43 76,50 67,57"
      stroke="url(#pulse-grad)"
      stroke-width="4.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Node points styled as small glowing circles -->
  <circle cx="23" cy="51" r="2" fill="#3ee8e4" opacity="0.7" />
  <circle cx="55" cy="31" r="2" fill="#3ee8e4" opacity="0.8" />
  <circle cx="85" cy="51" r="2" fill="#3ee8e4" opacity="0.7" />
</svg>
