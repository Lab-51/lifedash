<!DOCTYPE html>
<html lang="en" class="design-modern" data-design="modern">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeDash</title>
  <style>
    body {
      background: #06080d;
      margin: 0;
    }

    /* ── Splash container ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #06080d;
      opacity: 1;
      transition: opacity 300ms ease-out;
    }

    #splash.splash-hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Logo icon (inlined SVG — perfectly symmetric, centers reliably) ── */
    .splash-icon {
      width: 80px;
      height: 80px;
      opacity: 0;
      transform: translateY(16px);
      animation: reveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
    }

    /* ── LifeDash title (HTML text — centers reliably) ── */
    .splash-title {
      margin-top: 14px;
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      opacity: 0;
      transform: translateY(12px);
      animation: reveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
    }

    .splash-title .life { color: #e2e8f0; }
    .splash-title .dash { color: #3ee8e4; }

    /* ── Horizontal row of squares ── */
    .splash-row {
      display: flex;
      gap: 5px;
      margin-top: 32px;
    }

    .splash-sq {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      border: 1px solid #0a2d2d;
      background: transparent;
      position: relative;
      overflow: hidden;
      animation: sq-glow 0.3s ease-out forwards;
      animation-delay: calc(var(--i) * 0.18s + 0.4s);
    }

    .splash-sq::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      background: #3ee8e4;
      animation: sq-fill 0.3s ease-out forwards;
      animation-delay: calc(var(--i) * 0.18s + 0.4s);
    }

    @keyframes sq-fill {
      0%   { height: 0%; }
      100% { height: 100%; }
    }

    @keyframes sq-glow {
      0%   { box-shadow: none; border-color: #0a2d2d; }
      100% { box-shadow: 0 0 6px rgba(62, 232, 228, 0.4); border-color: #1a8e8c; }
    }

    /* ── Status text ── */
    .splash-status {
      margin-top: 20px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: #1a8e8c;
      opacity: 0;
      transform: translateY(8px);
      animation: reveal 0.5s ease-out 0.7s forwards;
    }

    /* ── Shared reveal animation ── */
    @keyframes reveal {
      0%   { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── Progress bar ── */
    .splash-progress {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #0a2d2d;
    }

    .splash-progress-fill {
      height: 100%;
      width: 0%;
      background: #3ee8e4;
      box-shadow: 0 0 8px rgba(62, 232, 228, 0.4);
      animation: progress-fill 3s ease-in-out forwards;
    }

    @keyframes progress-fill {
      0%   { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>

<body>
  <div id="splash">
    <!-- Icon (inlined from logo.svg — only the icon square, no text) -->
    <svg class="splash-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="s-bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0d1117" />
          <stop offset="100%" stop-color="#0a0e17" />
        </linearGradient>
        <linearGradient id="s-pulse" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#3ee8e4" />
          <stop offset="50%" stop-color="#3ee8e4" />
          <stop offset="100%" stop-color="#1a8e8c" />
        </linearGradient>
        <linearGradient id="s-border" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3ee8e4" stop-opacity="0.6" />
          <stop offset="50%" stop-color="#3ee8e4" stop-opacity="0.1" />
          <stop offset="100%" stop-color="#3ee8e4" stop-opacity="0.3" />
        </linearGradient>
        <filter id="s-glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
        <clipPath id="s-clip"><rect x="4" y="4" width="92" height="92" rx="20" /></clipPath>
      </defs>
      <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#s-bg)" />
      <g clip-path="url(#s-clip)">
        <line x1="20" y1="0" x2="20" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
        <line x1="50" y1="0" x2="50" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
        <line x1="80" y1="0" x2="80" y2="100" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
        <line x1="0" y1="35" x2="100" y2="35" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
        <line x1="0" y1="65" x2="100" y2="65" stroke="#3ee8e4" stroke-width="0.3" opacity="0.08" />
      </g>
      <rect x="4.75" y="4.75" width="90.5" height="90.5" rx="19.5" stroke="url(#s-border)" stroke-width="1.5" fill="none" />
      <g transform="translate(-5, 1)" filter="url(#s-glow)">
        <polyline points="14,50 24,50 30,42 38,62 46,30 54,68 60,50 70,50" stroke="url(#s-pulse)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <polyline points="67,43 76,50 67,57" stroke="url(#s-pulse)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </g>
      <circle cx="13" cy="51" r="2" fill="#3ee8e4" opacity="0.7" />
      <circle cx="45" cy="31" r="2" fill="#3ee8e4" opacity="0.8" />
      <circle cx="75" cy="51" r="2" fill="#3ee8e4" opacity="0.7" />
    </svg>

    <!-- Title -->
    <div class="splash-title">
      <span class="life">Life</span><span class="dash">Dash</span>
    </div>

    <!-- Horizontal row of squares -->
    <div class="splash-row">
      <div class="splash-sq" style="--i:0"></div>
      <div class="splash-sq" style="--i:1"></div>
      <div class="splash-sq" style="--i:2"></div>
      <div class="splash-sq" style="--i:3"></div>
      <div class="splash-sq" style="--i:4"></div>
      <div class="splash-sq" style="--i:5"></div>
      <div class="splash-sq" style="--i:6"></div>
      <div class="splash-sq" style="--i:7"></div>
      <div class="splash-sq" style="--i:8"></div>
      <div class="splash-sq" style="--i:9"></div>
      <div class="splash-sq" style="--i:10"></div>
      <div class="splash-sq" style="--i:11"></div>
      <div class="splash-sq" style="--i:12"></div>
      <div class="splash-sq" style="--i:13"></div>
    </div>

    <!-- Status line -->
    <div class="splash-status">INITIALIZING SYSTEMS...</div>

    <!-- Bootstrap error display (hidden until needed) -->
    <div id="splash-error" style="display:none;color:#f87171;font-family:monospace;font-size:12px;max-width:600px;margin-top:24px;padding:12px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;word-break:break-all;text-align:left;"></div>

    <!-- Progress bar -->
    <div class="splash-progress">
      <div class="splash-progress-fill"></div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="./bootstrap.ts"></script>
</body>

</html>
