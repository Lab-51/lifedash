<!DOCTYPE html>
<html lang="en" class="design-modern" data-design="modern">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeDash</title>
  <style>
    body {
      background: #020617;
      margin: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020617;
      opacity: 1;
      transition: opacity 300ms ease-out;
    }

    #splash.splash-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 300px;
      height: auto;
      opacity: 0;
      animation: logo-fade-in 0.8s ease-out forwards;
    }

    @keyframes logo-fade-in {
      0% {
        opacity: 0;
        transform: scale(0.95);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <img src="./assets/logo.svg" alt="LifeDash" class="splash-logo" />
  </div>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>

</html>
