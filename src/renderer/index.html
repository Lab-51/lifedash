<!DOCTYPE html>
<html lang="en" class="design-modern" data-design="modern">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeDash</title>
  <style>
    body {
      background: #06080d;
      margin: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #06080d;
      opacity: 1;
      transition: opacity 300ms ease-out;
    }

    #splash.splash-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 300px;
      height: auto;
      opacity: 0;
      animation: logo-fade-in 0.8s ease-out forwards;
    }

    @keyframes logo-fade-in {
      0% {
        opacity: 0;
        transform: scale(0.95);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <img src="./assets/logo.svg" alt="LifeDash" class="splash-logo" />
    <div id="splash-error" style="display:none;color:#f87171;font-family:monospace;font-size:12px;max-width:600px;margin-top:24px;padding:12px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;word-break:break-all;text-align:left;"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="./bootstrap.ts"></script>
</body>

</html>
