<!DOCTYPE html>
<html lang="en" class="design-modern" data-design="modern">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeDash</title>
  <style>
    body {
      background: #06080d;
      margin: 0;
    }

    /* ── Splash container ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #06080d;
      opacity: 1;
      transition: opacity 300ms ease-out;
    }

    #splash.splash-hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Logo icon (inlined SVG — perfectly symmetric, centers reliably) ── */
    .splash-icon {
      width: 80px;
      height: 80px;
      opacity: 0;
      transform: translateY(16px);
      animation: reveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
    }

    /* ── LifeDash title (HTML text — centers reliably) ── */
    .splash-title {
      margin-top: 14px;
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      opacity: 0;
      transform: translateY(12px);
      animation: reveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
    }

    .splash-title .life { color: #e2e8f0; }
    .splash-title .dash { color: #3ee8e4; }

    /* ── Horizontal row of squares ── */
    .splash-row {
      display: flex;
      gap: 5px;
      margin-top: 32px;
    }

    .splash-sq {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      border: 1px solid #0a2d2d;
      background: transparent;
      position: relative;
      overflow: hidden;
      animation: sq-glow 0.3s ease-out forwards;
      animation-delay: calc(var(--i) * 0.18s + 0.4s);
    }

    .splash-sq::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      background: #3ee8e4;
      animation: sq-fill 0.3s ease-out forwards;
      animation-delay: calc(var(--i) * 0.18s + 0.4s);
    }

    @keyframes sq-fill {
      0%   { height: 0%; }
      100% { height: 100%; }
    }

    @keyframes sq-glow {
      0%   { box-shadow: none; border-color: #0a2d2d; }
      100% { box-shadow: 0 0 6px rgba(62, 232, 228, 0.4); border-color: #1a8e8c; }
    }

    /* ── Status text ── */
    .splash-status {
      margin-top: 20px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: #1a8e8c;
      opacity: 0;
      transform: translateY(8px);
      animation: reveal 0.5s ease-out 0.7s forwards;
    }

    /* ── Shared reveal animation ── */
    @keyframes reveal {
      0%   { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── Progress bar ── */
    .splash-progress {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #0a2d2d;
    }

    .splash-progress-fill {
      height: 100%;
      width: 0%;
      background: #3ee8e4;
      box-shadow: 0 0 8px rgba(62, 232, 228, 0.4);
      animation: progress-fill 3s ease-in-out forwards;
    }

    @keyframes progress-fill {
      0%   { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>

<body>
  <div id="splash">
    <!-- Icon (inlined from new logo.svg — premium pulse + chevron) -->
    <svg class="splash-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="s-bg" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#141a23" />
          <stop offset="100%" stop-color="#080b0f" />
        </linearGradient>
        <linearGradient id="s-rim" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
          <stop offset="25%" stop-color="#ffffff" stop-opacity="0.02" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
        </linearGradient>
        <linearGradient id="s-pulse" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#1a8e8c" />
          <stop offset="100%" stop-color="#3ee8e4" />
        </linearGradient>
        <linearGradient id="s-chev" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3ee8e4" />
          <stop offset="100%" stop-color="#a0fcf9" />
        </linearGradient>
        <filter id="s-glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur" />
          <feComponentTransfer in="blur" result="glow">
            <feFuncA type="linear" slope="0.4" />
          </feComponentTransfer>
          <feMerge><feMergeNode in="glow" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      <rect x="2" y="3" width="96" height="96" rx="22" fill="#000000" opacity="0.3" />
      <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#s-bg)" />
      <rect x="3" y="3" width="94" height="94" rx="21" stroke="url(#s-rim)" stroke-width="1.5" fill="none" />
      <rect x="2" y="2" width="96" height="96" rx="22" stroke="#000000" stroke-width="1.5" stroke-opacity="0.6" fill="none" />
      <g filter="url(#s-glow)">
        <g transform="translate(0, 3)" opacity="0.35">
          <path d="M 14 50 L 28 50 L 34 20 L 46 80 L 52 50 L 66 50" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <path d="M 72 36 L 86 50 L 72 64" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </g>
        <path d="M 14 50 L 28 50 L 34 20 L 46 80 L 52 50 L 66 50" stroke="url(#s-pulse)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <path d="M 72 36 L 86 50 L 72 64" stroke="url(#s-chev)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </g>
    </svg>

    <!-- Title -->
    <div class="splash-title">
      <span class="life">Life</span><span class="dash">Dash</span>
    </div>

    <!-- Horizontal row of squares -->
    <div class="splash-row">
      <div class="splash-sq" style="--i:0"></div>
      <div class="splash-sq" style="--i:1"></div>
      <div class="splash-sq" style="--i:2"></div>
      <div class="splash-sq" style="--i:3"></div>
      <div class="splash-sq" style="--i:4"></div>
      <div class="splash-sq" style="--i:5"></div>
      <div class="splash-sq" style="--i:6"></div>
      <div class="splash-sq" style="--i:7"></div>
      <div class="splash-sq" style="--i:8"></div>
      <div class="splash-sq" style="--i:9"></div>
      <div class="splash-sq" style="--i:10"></div>
      <div class="splash-sq" style="--i:11"></div>
      <div class="splash-sq" style="--i:12"></div>
      <div class="splash-sq" style="--i:13"></div>
    </div>

    <!-- Status line -->
    <div class="splash-status">INITIALIZING SYSTEMS...</div>

    <!-- Bootstrap error display (hidden until needed) -->
    <div id="splash-error" style="display:none;color:#f87171;font-family:monospace;font-size:12px;max-width:600px;margin-top:24px;padding:12px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;word-break:break-all;text-align:left;"></div>

    <!-- Progress bar -->
    <div class="splash-progress">
      <div class="splash-progress-fill"></div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="./bootstrap.ts"></script>
</body>

</html>
