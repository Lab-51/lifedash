# === WORKFLOW PURPOSE ===
# Build macOS artifacts and attach them to the existing GitHub release when a version tag is pushed.
# Windows builds are handled locally via the CLAUDE.md release workflow (npm run publish).
# This workflow adds macOS DMG + ZIP to the same release and updates the Homebrew cask.

name: Release macOS

on:
  push:
    tags:
      - 'v*'

# Cancel any in-progress release for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS build — produces .dmg and .zip (Apple Silicon arm64)
  # ---------------------------------------------------------------------------
  macos-build:
    name: Build macOS (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # cmake is needed by native modules; python-setuptools for node-gyp
      - name: Install system dependencies
        run: brew install cmake python-setuptools

      - name: Install dependencies
        run: npm ci

      # Forge make produces both DMG and ZIP via the makers in forge.config.ts
      - name: Build macOS app
        run: npx electron-forge make
        env:
          SKIP_OBFUSCATION: 'true'

      # Extract version from tag
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Rename artifacts to the standard naming convention
      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Find and rename DMG
          DMG_SOURCE=$(find out/make -maxdepth 1 -name "*.dmg" | head -1)
          if [ -n "$DMG_SOURCE" ]; then
            DMG_TARGET="out/make/LifeDash-${VERSION}-mac-arm64.dmg"
            if [ "$DMG_SOURCE" != "$DMG_TARGET" ]; then
              cp "$DMG_SOURCE" "$DMG_TARGET"
            fi
          else
            echo "ERROR: No DMG found in out/make/"
            exit 1
          fi

          # Find and rename ZIP
          ZIP_SOURCE=$(find out/make/zip -name "*.zip" | head -1)
          if [ -n "$ZIP_SOURCE" ]; then
            ZIP_TARGET="out/make/LifeDash-${VERSION}-mac-arm64.zip"
            if [ "$ZIP_SOURCE" != "$ZIP_TARGET" ]; then
              cp "$ZIP_SOURCE" "$ZIP_TARGET"
            fi
          else
            echo "ERROR: No ZIP found in out/make/zip/"
            exit 1
          fi

          echo "Artifacts renamed:"
          ls -la "out/make/LifeDash-${VERSION}-mac-arm64.dmg"
          ls -la "out/make/LifeDash-${VERSION}-mac-arm64.zip"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: out/make/LifeDash-${{ steps.version.outputs.version }}-mac-arm64.dmg
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: out/make/LifeDash-${{ steps.version.outputs.version }}-mac-arm64.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish — download macOS artifacts, attach to the release (created by the
  # local Windows workflow via npm run publish), and update Homebrew cask
  # ---------------------------------------------------------------------------
  publish-macos:
    name: Publish macOS Assets
    runs-on: ubuntu-latest
    needs: [macos-build]

    steps:
      # Checkout is needed for the Homebrew update script
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Extract version from tag
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Download macOS ZIP
        uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: artifacts/

      - name: Verify downloaded artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ls -la artifacts/
          test -f "artifacts/LifeDash-${VERSION}-mac-arm64.dmg"
          test -f "artifacts/LifeDash-${VERSION}-mac-arm64.zip"
          echo "All macOS artifacts present."

      # Wait for the release to exist on this repo.
      # The local Windows workflow creates it via npm run publish + gh api.
      # This step polls until the release appears (up to 30 minutes).
      - name: Wait for release to exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Waiting for release ${TAG}..."

          for i in $(seq 1 60); do
            if gh release view "${TAG}" > /dev/null 2>&1; then
              echo "Release ${TAG} found!"
              exit 0
            fi
            echo "Attempt ${i}/60 — release not found yet, waiting 30s..."
            sleep 30
          done

          echo "ERROR: Release ${TAG} not found after 30 minutes. Creating it now..."
          gh release create "${TAG}" \
            --title "LifeDash v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest

      # Upload macOS assets to the release
      - name: Upload macOS assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"

          echo "Uploading macOS assets to ${TAG}..."

          gh release upload "${TAG}" \
            --clobber \
            "artifacts/LifeDash-${VERSION}-mac-arm64.dmg#macOS Apple Silicon Beta (.dmg)" \
            "artifacts/LifeDash-${VERSION}-mac-arm64.zip#macOS Apple Silicon Beta (.zip)"

          echo "macOS assets uploaded: https://github.com/Lab-51/lifedash/releases/tag/${TAG}"

      # Update the Homebrew cask with the new version and DMG SHA256
      # Uses RELEASE_TOKEN because this writes to a different repo (Lab-51/homebrew-lifedash)
      - name: Update Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="artifacts/LifeDash-${VERSION}-mac-arm64.dmg"
          node scripts/update-homebrew-cask.js "${VERSION}" "${DMG_PATH}"
