# === WORKFLOW PURPOSE ===
# Build and publish LifeDash releases for Windows and macOS when a version tag is pushed.
# Triggers on tags matching v* (e.g., v2.2.29).
# Builds platform artifacts in parallel, then publishes them to the public repo (Lab-51/lifedash).

name: Release

on:
  push:
    tags:
      - 'v*'

# Cancel any in-progress release for the same tag (shouldn't happen, but just in case)
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Top-level permissions for the built-in GITHUB_TOKEN (used within the same repo)
permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Windows build — produces .exe installer and .7z archive
  # ---------------------------------------------------------------------------
  windows-build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Inno Setup is needed for the installer; 7-Zip is pre-installed on windows-latest
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Install dependencies
        run: npm ci

      # Package the app (produces out/lifedash-win32-x64/)
      - name: Package Electron app
        run: npx electron-forge package
        env:
          SKIP_OBFUSCATION: 'true'

      # Build the Inno Setup installer (produces out/make/LifeDash-{version}-Setup.exe)
      - name: Build installer
        run: node scripts/build-installer.js

      # Build the 7z archive (produces out/make/LifeDash-{version}.7z)
      - name: Build 7z archive
        run: npm run make:archive

      # Extract version from tag for artifact naming
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Verify artifacts exist before uploading
      - name: Verify artifacts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ls -la "out/make/LifeDash-${VERSION}-Setup.exe"
          ls -la "out/make/LifeDash-${VERSION}.7z"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/make/LifeDash-${{ steps.version.outputs.version }}-Setup.exe
          if-no-files-found: error

      - name: Upload 7z archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-archive
          path: out/make/LifeDash-${{ steps.version.outputs.version }}.7z
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS build — produces .dmg and .zip (Apple Silicon arm64)
  # ---------------------------------------------------------------------------
  macos-build:
    name: Build macOS (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # cmake is needed by native modules; python-setuptools for node-gyp
      - name: Install system dependencies
        run: brew install cmake python-setuptools

      - name: Install dependencies
        run: npm ci

      # Forge make produces both DMG and ZIP via the makers in forge.config.ts
      - name: Build macOS app
        run: npx electron-forge make
        env:
          SKIP_OBFUSCATION: 'true'

      # Extract version from tag
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Rename artifacts to the standard naming convention:
      #   DMG: Forge outputs LifeDash-{version}-arm64.dmg or similar at out/make/
      #   ZIP: Forge outputs lifedash-darwin-arm64-{version}.zip at out/make/zip/darwin/arm64/
      # We rename to LifeDash-{version}-mac-arm64.{dmg,zip} for consistency.
      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Find and rename DMG
          DMG_SOURCE=$(find out/make -maxdepth 1 -name "*.dmg" | head -1)
          if [ -n "$DMG_SOURCE" ]; then
            DMG_TARGET="out/make/LifeDash-${VERSION}-mac-arm64.dmg"
            if [ "$DMG_SOURCE" != "$DMG_TARGET" ]; then
              cp "$DMG_SOURCE" "$DMG_TARGET"
            fi
          else
            echo "ERROR: No DMG found in out/make/"
            exit 1
          fi

          # Find and rename ZIP
          ZIP_SOURCE=$(find out/make/zip -name "*.zip" | head -1)
          if [ -n "$ZIP_SOURCE" ]; then
            ZIP_TARGET="out/make/LifeDash-${VERSION}-mac-arm64.zip"
            if [ "$ZIP_SOURCE" != "$ZIP_TARGET" ]; then
              cp "$ZIP_SOURCE" "$ZIP_TARGET"
            fi
          else
            echo "ERROR: No ZIP found in out/make/zip/"
            exit 1
          fi

          echo "Artifacts renamed:"
          ls -la "out/make/LifeDash-${VERSION}-mac-arm64.dmg"
          ls -la "out/make/LifeDash-${VERSION}-mac-arm64.zip"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: out/make/LifeDash-${{ steps.version.outputs.version }}-mac-arm64.dmg
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: out/make/LifeDash-${{ steps.version.outputs.version }}-mac-arm64.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish — download all artifacts, create GitHub release on public repo,
  # upload assets, and update Homebrew cask
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [windows-build, macos-build]

    steps:
      # Checkout is needed for the Homebrew update script
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Extract version from tag
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Download all build artifacts into a flat directory
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download Windows archive
        uses: actions/download-artifact@v4
        with:
          name: windows-archive
          path: artifacts/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Download macOS ZIP
        uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: artifacts/

      # Verify all artifacts are present
      - name: Verify downloaded artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Expected artifacts for v${VERSION}:"
          ls -la artifacts/
          test -f "artifacts/LifeDash-${VERSION}-Setup.exe"
          test -f "artifacts/LifeDash-${VERSION}.7z"
          test -f "artifacts/LifeDash-${VERSION}-mac-arm64.dmg"
          test -f "artifacts/LifeDash-${VERSION}-mac-arm64.zip"
          echo "All artifacts present."

      # Create the release on the PUBLIC repo (Lab-51/lifedash) and upload all assets.
      # Uses RELEASE_TOKEN (a PAT with repo scope) for cross-repo access.
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          REPO="Lab-51/lifedash"

          echo "Creating release ${TAG} on ${REPO}..."

          # Create the release with auto-generated notes as a starting point.
          # The user can edit the release notes later via the existing local workflow.
          gh release create "${TAG}" \
            --repo "${REPO}" \
            --title "LifeDash v${VERSION}" \
            --generate-notes \
            --latest \
            "artifacts/LifeDash-${VERSION}-Setup.exe#Windows Installer (.exe)" \
            "artifacts/LifeDash-${VERSION}.7z#Windows Portable (.7z)" \
            "artifacts/LifeDash-${VERSION}-mac-arm64.dmg#macOS Apple Silicon (.dmg)" \
            "artifacts/LifeDash-${VERSION}-mac-arm64.zip#macOS Apple Silicon (.zip)"

          echo "Release published: https://github.com/${REPO}/releases/tag/${TAG}"

      # Update the Homebrew cask with the new version and DMG SHA256.
      # Uses RELEASE_TOKEN for write access to Lab-51/homebrew-lifedash.
      - name: Update Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="artifacts/LifeDash-${VERSION}-mac-arm64.dmg"
          node scripts/update-homebrew-cask.js "${VERSION}" "${DMG_PATH}"
